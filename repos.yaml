# Repository manifest for workspace bootstrap.
# ref accepts a branch, tag, or commit SHA.
repos:
  - name: gnuradio4-core
    url: https://github.com/mormj/gnuradio4-core
    dest: src/gnuradio4-core
    ref: split_repos

  - name: gnuradio4-algorithm
    url: https://github.com/mormj/gnuradio4-algorithm
    dest: src/gnuradio4-algorithm
    ref: split_repos

  - name: gnuradio4-blocks
    url: https://github.com/mormj/gnuradio4-blocks
    dest: src/gnuradio4-blocks
    ref: split_repos

  - name: gr4-incubator
    url: https://github.com/gnuradio/gr4-incubator
    dest: src/gr4-incubator
    ref: main

  - name: gr4-control-plane
    url: https://github.com/altiolabs/gr4-control-plane
    dest: src/gr4-control-plane
    ref: main

  - name: gr4-studio
    url: https://github.com/altiolabs/gr4-studio
    dest: src/gr4-studio
    ref: main
